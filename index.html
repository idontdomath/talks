<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Talks</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #000;
  --bg-elev: #0d0d0f;
  --bg-card: #131318;
  --text: #f3f4f7;
  --dim: #8b8e98;
  --light: #b6b9c2;
  --line: #232329;
  --blue: #0a84ff;
  --green: #30d158;
  --orange: #ff9f0a;
  --purple: #bf5af2;
}
html, body {
  min-height: 100%;
  font-family: 'Inter', 'SF Pro Display', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
  background: var(--bg); color: var(--text);
  font-size: 18px; line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
@font-face { font-family: 'Inter'; font-weight: 100 900; font-style: normal; font-display: swap;
             src: url('https://rsms.me/inter/font-files/InterVariable.woff2') format('woff2'); }

header {
  border-bottom: 1px solid var(--line);
  padding: 2.5rem 4rem;
  display: flex; align-items: baseline; gap: 1rem;
}
.site-eyebrow {
  letter-spacing: 0.14em; text-transform: uppercase;
  font-weight: 600; font-size: 0.85rem; color: var(--blue);
}
.site-title {
  font-size: 1.6rem; font-weight: 800; letter-spacing: -0.03em;
}

main {
  max-width: 960px;
  margin: 0 auto;
  padding: 4rem 4rem 6rem;
}

.section-label {
  letter-spacing: 0.14em; text-transform: uppercase;
  font-weight: 600; font-size: 0.8rem; color: var(--dim);
  margin-bottom: 1.5rem;
}

.talks-list {
  display: flex; flex-direction: column; gap: 1rem;
  list-style: none;
}

.talk-card {
  background: var(--bg-card);
  border-radius: 16px;
  border: 1px solid var(--line);
  padding: 1.6rem 2rem;
  display: flex; align-items: center; justify-content: space-between; gap: 2rem;
  text-decoration: none; color: inherit;
  transition: border-color 0.15s, background 0.15s;
  position: relative; overflow: hidden;
}
.talk-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: var(--accent, var(--blue));
  opacity: 0.8;
}
.talk-card:hover {
  border-color: rgba(255,255,255,0.12);
  background: #16161c;
}

.talk-info { flex: 1; }
.talk-title {
  font-size: 1.2rem; font-weight: 700; letter-spacing: -0.01em;
  margin-bottom: 0.35rem;
}
.talk-meta {
  display: flex; gap: 1.2rem; align-items: center;
  font-size: 0.88rem; color: var(--dim);
}
.talk-tag {
  display: inline-block; padding: 0.15rem 0.6rem; border-radius: 999px;
  font-size: 0.78rem; font-weight: 600; letter-spacing: 0.02em;
  background: rgba(255,255,255,0.06);
  color: var(--blue); border: 1px solid rgba(10,132,255,0.3);
}

.talk-arrow {
  color: var(--dim); font-size: 1.3rem; flex-shrink: 0;
  transition: transform 0.15s, color 0.15s;
}
.talk-card:hover .talk-arrow {
  transform: translateX(4px); color: var(--blue);
}
</style>
</head>
<body>

<header>
  <span class="site-eyebrow">Martin Ramos Mejia</span>
  <span class="site-title">Talks</span>
</header>

<main>
  <p class="section-label">Charlas</p>
  <ul class="talks-list">

    <li>
      <a class="talk-card" href="spec-driven-development/" style="--accent: var(--blue)">
        <div class="talk-info">
          <div class="talk-title">Spec-driven development con coding agents</div>
          <div class="talk-meta">
            <span>2025</span>
            <span class="talk-tag">AI / Agentes</span>
          </div>
        </div>
        <span class="talk-arrow">→</span>
      </a>
    </li>

  </ul>
</main>

</body>
</html>
